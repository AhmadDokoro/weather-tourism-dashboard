<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderLite • Currency Exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <header class="topbar">
    <a href="/home" class="brand"><i class="fa-solid fa-earth-africa"></i> WanderLite</a>
    <nav>
      <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
      <a href="/"><i class="fa-solid fa-house"></i> Landing</a>
    </nav>
  </header>

  <main class="page-shell center-shell">
    <section class="glass-panel exchange-card">
      <p class="eyebrow">Live Exchange</p>
      <h1>Convert currencies in real time</h1>
      <p class="hero-subtext">Rates are dynamically fetched through the backend and presented with conversion transparency.</p>

      <form id="exchangeForm" class="stack-form">
        <label>
          Amount
          <input type="number" name="amount" id="amount" placeholder="e.g. 100" min="0.01" step="0.01" required />
        </label>

        <label>
          From
          <select name="from" id="fromCurrency" required></select>
        </label>

        <label>
          To
          <select name="to" id="toCurrency" required></select>
        </label>

        <button class="primary-btn" type="submit"><i class="fa-solid fa-repeat"></i> Convert Currency</button>
      </form>

      <p id="exchangeHint" class="muted">Example: 100 USD → EUR</p>
    </section>
  </main>

  <script src="js/exchange.js"></script>
</body>
</html>
